<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vault — File Uploader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0c0e;
      --surface: #111215;
      --surface2: #18191d;
      --border: #2a2b30;
      --border2: #3a3b40;
      --accent: #e8ff47;
      --accent-dim: rgba(232,255,71,0.12);
      --accent-glow: rgba(232,255,71,0.06);
      --text: #f0f0f0;
      --muted: #6b6c72;
      --muted2: #9a9ba0;
      --danger: #ff4f4f;
      --success: #47ffb0;
      --mono: 'DM Mono', monospace;
      --sans: 'Syne', sans-serif;
      --radius: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }
    .logo {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo svg { width: 22px; height: 22px; }
    .node-badge {
      font-family: var(--mono);
      font-size: 11px;
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 20px;
      color: var(--muted2);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .node-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ─── MAIN ─── */
    main {
      flex: 1;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 8px;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 40px;
    }

    /* ─── DROP ZONE ─── */
    .drop-zone {
      border: 1.5px dashed var(--border2);
      border-radius: 12px;
      padding: 52px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--surface);
      position: relative;
      margin-bottom: 32px;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: var(--accent-glow);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .drop-icon {
      width: 48px; height: 48px;
      margin: 0 auto 16px;
      border: 1.5px solid var(--border2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2);
      transition: all 0.2s;
    }
    .drop-zone:hover .drop-icon, .drop-zone.drag-over .drop-icon {
      border-color: var(--accent);
      background: var(--accent-dim);
    }
    .drop-icon svg { width: 22px; height: 22px; stroke: var(--muted2); transition: stroke 0.2s; }
    .drop-zone:hover .drop-icon svg, .drop-zone.drag-over .drop-icon svg { stroke: var(--accent); }
    .drop-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .drop-hint {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    /* ─── UPLOAD QUEUE ─── */
    .queue { margin-bottom: 32px; display: flex; flex-direction: column; gap: 10px; }
    .queue-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
    .queue-name {
      flex: 1;
      font-family: var(--mono);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .queue-size { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
    .progress-bar {
      height: 2px; background: var(--border2); border-radius: 2px; flex: 1; min-width: 80px;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease;
    }
    .queue-status {
      font-family: var(--mono);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .status-pending { background: var(--surface2); color: var(--muted); }
    .status-uploading { background: var(--accent-dim); color: var(--accent); }
    .status-done { background: rgba(71,255,176,0.1); color: var(--success); }
    .status-error { background: rgba(255,79,79,0.1); color: var(--danger); }

    /* ─── UPLOAD BUTTON ─── */
    .btn-upload {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      padding: 12px 28px;
      background: var(--accent);
      color: #0b0c0e;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 40px;
    }
    .btn-upload:hover { background: #d4eb2a; transform: translateY(-1px); }
    .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ─── FILES LIST ─── */
    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .files-list { display: flex; flex-direction: column; gap: 8px; }
    .file-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
    }
    .file-row:hover { border-color: var(--border2); }
    .file-ext {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 3px 7px;
      border-radius: 4px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted2);
      text-transform: uppercase;
      min-width: 40px;
      text-align: center;
    }
    .file-key {
      flex: 1;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
    .file-date { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
    .btn-icon {
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .btn-icon:hover { border-color: var(--accent); color: var(--accent); }
    .btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); }
    .btn-icon svg { width: 14px; height: 14px; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    /* ─── TOAST ─── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
    }
    .toast {
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 16px;
      border-radius: var(--radius);
      border: 1px solid;
      animation: slideIn 0.25s ease;
      max-width: 320px;
    }
    @keyframes slideIn { from{opacity:0;transform:translateX(16px)} to{opacity:1;transform:translateX(0)} }
    .toast.success { background: rgba(71,255,176,0.08); border-color: rgba(71,255,176,0.3); color: var(--success); }
    .toast.error { background: rgba(255,79,79,0.08); border-color: rgba(255,79,79,0.3); color: var(--danger); }
    .toast.info { background: var(--surface); border-color: var(--border2); color: var(--muted2); }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      VAULT
    </div>
    <div class="node-badge">
      <span class="node-dot"></span>
      <span id="node-label">connecting...</span>
    </div>
  </header>

  <main>
    <h1>Drop files,<br/><span>ship to MinIO.</span></h1>
    <p class="subtitle">Fast and simple uploads to MinIO storage</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" multiple/>
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <div class="drop-label">Drop files here or click to browse</div>
      <div class="drop-hint">Any file type · Max 50MB per file</div>
    </div>

    <div class="queue" id="queue"></div>

    <button class="btn-upload" id="uploadBtn" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
        <path d="M5 20h14"/>
      </svg>
      Upload to MinIO
    </button>

    <div class="section-title">Stored files</div>
    <div class="files-list" id="filesList"><div class="empty-state">Loading files...</div></div>
  </main>

  <div class="toast-container" id="toasts"></div>

  <script>
    const API = "";
    let pendingFiles = [];

    // ── node health ──
    async function checkHealth() {
      try {
        const r = await fetch(`${API}/api/health`);
        const d = await r.json();
        document.getElementById("node-label").textContent = d.nodeId;
      } catch { document.getElementById("node-label").textContent = "offline"; }
    }
    checkHealth();

    // ── drag & drop ──
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");

    dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
    dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
    dropZone.addEventListener("drop", e => {
      e.preventDefault(); dropZone.classList.remove("drag-over");
      addFiles([...e.dataTransfer.files]);
    });
    fileInput.addEventListener("change", () => addFiles([...fileInput.files]));

    function addFiles(files) {
      files.forEach(f => {
        if (!pendingFiles.find(p => p.file.name === f.name && p.file.size === f.size)) {
          pendingFiles.push({ file: f, status: "pending", progress: 0, id: Math.random().toString(36).slice(2) });
        }
      });
      renderQueue();
      document.getElementById("uploadBtn").disabled = pendingFiles.length === 0;
    }

    function renderQueue() {
      const q = document.getElementById("queue");
      q.innerHTML = pendingFiles.map(item => `
        <div class="queue-item" id="qi-${item.id}">
          <span class="queue-name">${item.file.name}</span>
          <span class="queue-size">${fmtSize(item.file.size)}</span>
          <div class="progress-bar"><div class="progress-fill" id="pb-${item.id}" style="width:${item.progress}%"></div></div>
          <span class="queue-status status-${item.status}">${item.status}</span>
        </div>
      `).join("");
    }

    // ── upload ──
    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const btn = document.getElementById("uploadBtn");
      btn.disabled = true;

      for (const item of pendingFiles) {
        if (item.status !== "pending") continue;
        item.status = "uploading";
        renderQueue();

        const fd = new FormData();
        fd.append("file", item.file);

        try {
          const xhr = new XMLHttpRequest();
          await new Promise((res, rej) => {
            xhr.upload.addEventListener("progress", e => {
              if (e.lengthComputable) {
                item.progress = Math.round((e.loaded / e.total) * 100);
                document.getElementById(`pb-${item.id}`).style.width = item.progress + "%";
              }
            });
            xhr.addEventListener("load", () => {
              if (xhr.status === 200) { item.status = "done"; item.progress = 100; res(); }
              else { item.status = "error"; rej(new Error(xhr.responseText)); }
            });
            xhr.addEventListener("error", () => { item.status = "error"; rej(); });
            xhr.open("POST", `${API}/api/upload`);
            xhr.send(fd);
          });
          toast(`Uploaded: ${item.file.name}`, "success");
        } catch (e) {
          item.status = "error";
          toast(`Failed: ${item.file.name}`, "error");
        }
        renderQueue();
      }

      pendingFiles = pendingFiles.filter(i => i.status !== "done");
      renderQueue();
      document.getElementById("uploadBtn").disabled = pendingFiles.length === 0;
      loadFiles();
    });

    // ── list files ──
    async function loadFiles() {
      const list = document.getElementById("filesList");
      try {
        const r = await fetch(`${API}/api/files`);
        const { files, handledBy } = await r.json();
        if (!files.length) {
          list.innerHTML = `<div class="empty-state">No files yet. Upload something!</div>`;
          return;
        }
        list.innerHTML = files.map(f => {
          const ext = f.key.split(".").pop().toUpperCase() || "FILE";
          return `
          <div class="file-row" id="fr-${f.key}">
            <span class="file-ext">${ext.slice(0, 6)}</span>
            <span class="file-key" title="${f.key}">${f.key}</span>
            <span class="file-size">${fmtSize(f.size)}</span>
            <span class="file-date">${fmtDate(f.lastModified)}</span>
            <button class="btn-icon" onclick="downloadFile('${f.key}')" title="Download">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
            <button class="btn-icon danger" onclick="deleteFile('${f.key}')" title="Delete">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </div>`;
        }).join("");
      } catch {
        list.innerHTML = `<div class="empty-state">Could not connect to storage.</div>`;
      }
    }
    loadFiles();

    async function downloadFile(key) {
      try {
        const r = await fetch(`${API}/api/presign/${key}`);
        const { url } = await r.json();
        window.open(url, "_blank");
      } catch { toast("Could not get download link", "error"); }
    }

    async function deleteFile(key) {
      if (!confirm(`Delete ${key}?`)) return;
      try {
        await fetch(`${API}/api/files/${key}`, { method: "DELETE" });
        toast(`Deleted: ${key}`, "success");
        document.getElementById(`fr-${key}`)?.remove();
        if (!document.querySelector(".file-row")) {
          document.getElementById("filesList").innerHTML = `<div class="empty-state">No files yet. Upload something!</div>`;
        }
      } catch { toast("Delete failed", "error"); }
    }

    // ── utils ──
    function fmtSize(b) {
      if (b < 1024) return `${b} B`;
      if (b < 1024 * 1024) return `${(b/1024).toFixed(1)} KB`;
      return `${(b/1024/1024).toFixed(1)} MB`;
    }
    function fmtDate(d) {
      if (!d) return "";
      return new Date(d).toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
    }
    function toast(msg, type = "info") {
      const c = document.getElementById("toasts");
      const el = document.createElement("div");
      el.className = `toast ${type}`;
      el.textContent = msg;
      c.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }
  </script>
</body>
</html>
